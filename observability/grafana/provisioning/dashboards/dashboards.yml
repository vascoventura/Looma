apiVersion: 1

providers:
  - name: looma
    orgId: 1
    folder: Looma
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Keep dashboards outside /var/lib/grafana so the persisted data volume
      # (looma_grafana_data) doesn't hide provisioned dashboards.
      path: /opt/looma-dashboards
